<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>snap</title>
		<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
		<link rel="stylesheet" href="popup.css">
	</head>
	<body>
		<main>
			<!-- Nav Glass -->
			<header class="nav-glass">
				<div class="brand">
					<span class="material-symbols-outlined brand-icon" aria-hidden="true">photo_camera</span>
					<span class="brand-name">snap</span>
				</div>
				<button
					id="themeToggle"
					class="theme-toggle"
					type="button"
					aria-label="Toggle light and dark mode"
					title="Toggle theme"
					>
					<span class="material-symbols-outlined icon-sun" aria-hidden="true">light_mode</span>
					<span class="material-symbols-outlined icon-moon" aria-hidden="true">dark_mode</span>
				</button>
			</header>

			<!-- Hero Section -->
			<section class="hero">
				<h1 class="hero-title">Snap what you see.</h1>
				<p class="hero-subtitle">Screen, region, or element.</p>
				<div class="capture-list">
					<button class="capture-btn feature-button" data-mode="visible">
						<span class="capture-btn-content">
							<span class="capture-icon-badge">
								<span class="material-symbols-outlined capture-icon" aria-hidden="true">desktop_windows</span>
							</span>
							<span class="capture-label">Visible Screen</span>
						</span>
						<span class="material-symbols-outlined capture-chevron" aria-hidden="true">arrow_forward_ios</span>
					</button>
					<button class="capture-btn feature-button" data-mode="region">
						<span class="capture-btn-content">
							<span class="capture-icon-badge">
								<span class="material-symbols-outlined capture-icon" aria-hidden="true">crop</span>
							</span>
							<span class="capture-label">Selected Region</span>
						</span>
						<span class="material-symbols-outlined capture-chevron" aria-hidden="true">arrow_forward_ios</span>
					</button>
					<button class="capture-btn feature-button" data-mode="element">
						<span class="capture-btn-content">
							<span class="capture-icon-badge">
								<span class="material-symbols-outlined capture-icon" aria-hidden="true">touch_app</span>
							</span>
							<span class="capture-label">Specific Element</span>
						</span>
						<span class="material-symbols-outlined capture-chevron" aria-hidden="true">arrow_forward_ios</span>
					</button>
				</div>
			</section>

			<!-- Settings Section -->
			<section class="settings-section">
				<div class="settings-card" id="settings">
					<div class="setting-row">
						<div class="setting-label">
							<span class="material-symbols-outlined setting-icon" aria-hidden="true">high_quality</span>
							<label for="highResolution">High Resolution</label>
						</div>
						<label class="toggle">
							<input
								type="checkbox"
								id="highResolution"
								name="highResolution"
								value="enableHighResolution"
								checked
								/>
							<span class="toggle-track">
								<span class="toggle-thumb"></span>
							</span>
						</label>
					</div>
				</div>
				<div class="advanced-link-row">
					<a href="#" class="advanced-link">
						Advanced Settings
						<span class="material-symbols-outlined advanced-link-icon" aria-hidden="true">chevron_right</span>
					</a>
				</div>
			</section>
		</main>
		<script src="dist/popup.js" defer></script>
	</body>
</html>
